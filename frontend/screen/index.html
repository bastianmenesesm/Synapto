<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Synapto — Pantalla</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="../config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #161628;
      --surface2: #1e1e38;
      --border: rgba(255,255,255,0.08);
      --accent: #7c5cfc;
      --accent2: #4ecdc4;
      --text: #f0f0ff;
      --muted: rgba(240,240,255,0.5);
      --shadow: rgba(0,0,0,0.5);
    }
    [data-theme="light"] {
      --bg: #f4f4fb;
      --surface: #ffffff;
      --surface2: #eeeeff;
      --border: rgba(0,0,0,0.1);
      --accent: #6c47f0;
      --accent2: #0ea5a0;
      --text: #1a1a2e;
      --muted: rgba(26,26,46,0.5);
      --shadow: rgba(100,100,180,0.15);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow: hidden; transition: background .3s, color .3s; }
    body { display: flex; flex-direction: column; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
    .header h1 { font-size: 22px; font-weight: 900; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
    .header-right { display: flex; align-items: center; gap: 16px; }

    .hdr-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; width: 36px; height: 36px; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s;
    }
    .hdr-btn:hover { background: var(--accent); color: #fff; transform: scale(1.08); }
    .theme-btn { /* alias */ }

    /* Volume control */
    .vol-wrap { position: relative; display: flex; align-items: center; }
    .vol-slider-pop {
      display: none; position: absolute; bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 10px; box-shadow: 0 8px 24px var(--shadow);
      flex-direction: column; align-items: center; gap: 8px; z-index: 200;
    }
    .vol-wrap:hover .vol-slider-pop,
    .vol-wrap:focus-within .vol-slider-pop { display: flex; }
    .vol-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    input[type=range].vol-range {
      writing-mode: vertical-lr; direction: rtl;
      width: 6px; height: 80px; cursor: pointer;
      -webkit-appearance: slider-vertical; appearance: slider-vertical;
      accent-color: var(--accent); background: transparent;
    }

    /* Presenter bar */
    .presenter-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 600;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 10px 20px; background: rgba(13,13,26,.88);
      border-top: 1px solid var(--border); backdrop-filter: blur(10px);
    }
    [data-theme="light"] .presenter-bar { background: rgba(255,255,255,.88); }
    .presenter-bar.hidden { display: none !important; }
    .presenter-btn {
      padding: 10px 24px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .15s, transform .1s; display: flex; align-items: center; gap: 8px;
    }
    .presenter-btn:active { transform: scale(.96); }
    .presenter-btn-next { background: var(--accent); color: #fff; }
    .presenter-btn-next:hover { background: #6a4de8; }
    .presenter-btn-reveal { background: var(--accent2); color: #fff; }
    .presenter-btn-reveal:hover { filter: brightness(.9); }
    .presenter-label { font-size: 12px; color: var(--muted); letter-spacing: .5px; }

    .spectator-badge {
      display: none; background: rgba(255,152,0,.15); border: 1px solid rgba(255,152,0,.4);
      color: #FF9800; font-size: 12px; font-weight: 700; padding: 4px 12px;
      border-radius: 999px; letter-spacing: .5px;
    }
    .spectator-badge.visible { display: block; }

    .timer-ring { width: 64px; height: 64px; position: relative; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-ring .bg { fill: none; stroke: var(--surface); stroke-width: 5; }
    .timer-ring .fg { fill: none; stroke: var(--accent2); stroke-width: 5; stroke-dasharray: 163; stroke-dashoffset: 0; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke .3s; }
    .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; }

    .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; position: relative; overflow: hidden; }
    .hidden { display: none !important; }

    /* ── Lobby ── */
    .lobby-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .lobby-headline {
      font-size: 18px; color: var(--muted); margin-bottom: 32px;
      animation: fadeSlideDown .5s .05s ease both;
    }
    .lobby-center { display: flex; align-items: center; gap: 56px; flex-wrap: wrap; justify-content: center; }

    .qr-block {
      background: #fff; border-radius: 20px; padding: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
      animation: qrBounce .65s .2s cubic-bezier(.34,1.56,.64,1) both;
    }
    .qr-block img { display: block; width: 220px; height: 220px; }

    .lobby-code-wrap { text-align: center; }
    .lobby-join-hint { font-size: 16px; color: var(--muted); margin-bottom: 12px; animation: fadeSlideDown .5s .1s ease both; }
    .lobby-domain {
      font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 20px;
      animation: fadeSlideDown .5s .15s ease both;
    }
    .lobby-code {
      font-size: 96px; font-weight: 900; letter-spacing: 16px; color: var(--accent2); line-height: 1;
      animation: codeBlast .7s .08s cubic-bezier(.17,.67,.35,1.35) both, codeGlow 2.5s 1s ease-in-out infinite;
    }
    .lobby-url {
      font-size: 14px; color: var(--muted); margin-top: 14px;
      animation: fadeSlideUp .5s .9s ease both;
    }

    .player-bubbles { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 32px; max-width: 980px; }
    .bubble {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 10px 16px 8px; font-size: 15px; animation: popIn .35s cubic-bezier(.34,1.56,.64,1) ease;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      min-width: 72px; box-shadow: 0 4px 14px var(--shadow);
    }
    .bubble-emoji { font-size: 36px; line-height: 1; }
    .bubble-name { font-size: 12px; font-weight: 700; color: var(--muted); text-align: center; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    @keyframes popIn { from{transform:scale(0) rotate(-8deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }

    /* Lobby entrance animations */
    @keyframes codeBlast {
      0%   { transform: scale(0.3) rotate(-3deg); opacity: 0; filter: blur(12px); }
      60%  { transform: scale(1.07) rotate(1deg); opacity: 1; filter: blur(0); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0); }
    }
    @keyframes codeGlow {
      0%, 100% { text-shadow: 0 0 30px rgba(78,205,196,.35); }
      50%       { text-shadow: 0 0 70px rgba(78,205,196,.75), 0 0 120px rgba(78,205,196,.25); }
    }
    @keyframes qrBounce {
      0%   { transform: scale(0.4); opacity: 0; }
      65%  { transform: scale(1.07); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeSlideDown {
      from { transform: translateY(-14px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeSlideUp {
      from { transform: translateY(10px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* Question */
    .q-progress { font-size: 14px; color: var(--muted); margin-bottom: 12px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .q-text-big { font-size: clamp(22px, 3.5vw, 42px); font-weight: 800; text-align: center; max-width: 900px; line-height: 1.25; margin-bottom: 32px; }
    .q-answered-bar { font-size: 13px; color: var(--muted); margin-top: 20px; display: flex; align-items: center; gap: 10px; }
    .q-answered-dots { display: flex; gap: 4px; flex-wrap: wrap; max-width: 300px; }
    .q-answered-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); opacity: 0; transition: opacity .3s; }
    .q-answered-dot.filled { opacity: 1; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 920px; }
    .opt-card { border-radius: 16px; padding: 20px 24px; display: flex; align-items: center; gap: 14px; font-size: clamp(14px, 1.8vw, 20px); font-weight: 700; transition: opacity .3s, transform .3s; color: #fff; box-shadow: 0 6px 28px var(--shadow); }
    .opt-card .lbl { font-size: clamp(20px, 2.5vw, 32px); font-weight: 900; min-width: 36px; text-shadow: 0 2px 4px rgba(0,0,0,.25); }
    .opt-0 { background: linear-gradient(135deg, #E63946, #c0263a); }
    .opt-1 { background: linear-gradient(135deg, #2196F3, #0d7cd6); }
    .opt-2 { background: linear-gradient(135deg, #FF9800, #e07800); }
    .opt-3 { background: linear-gradient(135deg, #4CAF50, #378a3a); }
    .opt-correct { transform: scale(1.04); box-shadow: 0 0 0 4px rgba(255,255,255,.9), 0 8px 32px var(--shadow); }
    .opt-wrong { opacity: .22; filter: grayscale(.4); }

    /* Ranking */
    .rank-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; text-align: center; }
    .rank-list { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 10px; }
    .rank-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 18px; animation: slideIn .4s ease; box-shadow: 0 2px 12px var(--shadow); }
    @keyframes slideIn { from{transform:translateX(-24px);opacity:0} to{transform:translateX(0);opacity:1} }
    .rank-pos { font-size: 26px; min-width: 40px; }
    .rank-name { flex: 1; font-size: 18px; font-weight: 700; }
    .rank-pts { font-size: 20px; font-weight: 900; color: var(--accent2); }
    .rank-bar-wrap { width: 100%; height: 5px; background: var(--surface2); border-radius: 3px; margin-top: 6px; }
    .rank-bar { height: 5px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width .7s cubic-bezier(.4,0,.2,1); }

    /* Tally bars */
    .tally { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 920px; margin-top: 18px; }
    .tally-item { border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; color: #fff; font-weight: 700; box-shadow: 0 4px 16px var(--shadow); }
    .tally-bar { flex: 1; height: 10px; background: rgba(255,255,255,.2); border-radius: 5px; overflow: hidden; }
    .tally-fill { height: 100%; border-radius: 5px; background: rgba(255,255,255,.8); transition: width .7s cubic-bezier(.4,0,.2,1); }
    .tally-count { font-weight: 800; font-size: 18px; min-width: 28px; text-align: right; }
    .t0 { background: linear-gradient(135deg, #E63946, #c0263a); }
    .t1 { background: linear-gradient(135deg, #2196F3, #0d7cd6); }
    .t2 { background: linear-gradient(135deg, #FF9800, #e07800); }
    .t3 { background: linear-gradient(135deg, #4CAF50, #378a3a); }

    /* Podium */
    .podium-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 820px; }
    .podium-title { font-size: clamp(22px, 3vw, 32px); font-weight: 900; margin-bottom: 28px; text-align: center; animation: fadeSlideDown .5s ease both; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .podium-stage { display: flex; align-items: flex-end; justify-content: center; gap: 16px; width: 100%; margin-bottom: 32px; }
    .podium-col { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 210px; }
    .podium-player { text-align: center; margin-bottom: 10px; animation: popIn .5s ease both; }
    .podium-emoji { font-size: 48px; }
    .podium-name { font-size: 15px; font-weight: 800; margin-top: 6px; }
    .podium-score { font-size: 14px; color: var(--accent2); margin-top: 2px; font-weight: 700; }
    .podium-bar { width: 100%; border-radius: 14px 14px 0 0; display: flex; align-items: center; justify-content: center; font-size: 38px; transform-origin: bottom; box-shadow: 0 -4px 20px var(--shadow); }
    .pb1 { height: 180px; background: linear-gradient(180deg,#FFD700,#F08C00); animation: riseUp .7s .2s cubic-bezier(.34,1.4,.64,1) both; }
    .pb2 { height: 125px; background: linear-gradient(180deg,#D8D8D8,#9E9E9E); animation: riseUp .7s .4s cubic-bezier(.34,1.4,.64,1) both; }
    .pb3 { height: 88px;  background: linear-gradient(180deg,#E8A96C,#8B5E3C); animation: riseUp .7s .6s cubic-bezier(.34,1.4,.64,1) both; }
    .podium-rest { width: 100%; max-width: 820px; display: flex; flex-direction: column; gap: 8px; }
    @keyframes riseUp { from{transform:scaleY(0);opacity:0} to{transform:scaleY(1);opacity:1} }
    .confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden; }
    @keyframes confettiFall { to { transform: translateY(105vh) rotate(720deg); opacity:0; } }

    /* Countdown overlay */
    #screen-countdown { position: fixed; inset: 0; background: rgba(0,0,0,.72); display: flex; align-items: center; justify-content: center; z-index: 500; }
    #screen-countdown.hidden { display: none !important; }
    .screen-cd-num { font-size: 200px; font-weight: 900; line-height: 1; animation: cdPop .35s ease-out; background: linear-gradient(135deg,#7c5cfc,#4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    @keyframes cdPop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* Floating reactions */
    .reaction-layer { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
    .reaction-bubble {
      position: absolute; bottom: 8%; font-size: 48px;
      animation: floatUp 2.8s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.4) rotate(-10deg); opacity: 1; }
      50%  { opacity: 1; }
      100% { transform: translateY(-65vh) scale(1.4) rotate(10deg); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="header">
  <h1>Synapto</h1>
  <div id="q-counter-header" style="font-size:14px;color:var(--muted)"></div>
  <div class="header-right">
    <span class="spectator-badge" id="spectator-badge">👁 ESPECTADOR</span>
    <div class="vol-wrap">
      <button class="hdr-btn" id="music-btn" onclick="toggleMusic()" title="Volumen">🔊</button>
      <div class="vol-slider-pop">
        <span class="vol-label" id="vol-label">50%</span>
        <input type="range" class="vol-range" id="vol-range" min="0" max="100" value="50" oninput="setVolume(this.value)"/>
      </div>
    </div>
    <button class="hdr-btn" id="theme-btn" onclick="toggleTheme()" title="Cambiar tema">☀️</button>
    <button class="hdr-btn" id="fs-btn" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
    <div class="timer-ring" id="timer-ring" style="visibility:hidden">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle class="bg" cx="32" cy="32" r="26"/>
        <circle class="fg" id="timer-fg" cx="32" cy="32" r="26"/>
      </svg>
      <div class="timer-num" id="timer-num">-</div>
    </div>
  </div>
</div>

<div class="content">

  <!-- Lobby -->
  <div id="s-lobby">
    <div class="lobby-wrap">
      <p class="lobby-headline">Escaneá el QR o ingresá el código</p>
      <div class="lobby-center">
        <div id="qr-block" class="qr-block"></div>
        <div class="lobby-code-wrap">
          <p class="lobby-join-hint">Ingresá en</p>
          <p class="lobby-domain">synapto.vercel.app</p>
          <div class="lobby-code" id="lobby-code">------</div>
          <p class="lobby-url" id="lobby-url"></p>
        </div>
      </div>
      <div class="player-bubbles" id="player-bubbles"></div>
    </div>
  </div>

  <!-- Question -->
  <div id="s-question" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center">
    <p class="q-progress" id="q-progress"></p>
    <p class="q-text-big" id="q-text-big"></p>
    <div class="options-grid" id="options-grid"></div>
    <div class="q-answered-bar" id="screen-answered-bar" style="display:none">
      <span id="screen-answered-text">0 respondieron</span>
      <div class="q-answered-dots" id="screen-answered-dots"></div>
    </div>
  </div>

  <!-- Reveal -->
  <div id="s-reveal" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center">
    <p class="q-text-big" id="reveal-q-text" style="font-size:24px;margin-bottom:24px"></p>
    <div class="options-grid" id="reveal-options-grid"></div>
    <div class="tally" id="tally-grid"></div>
    <div class="rank-list" style="margin-top:32px" id="reveal-ranking"></div>
  </div>

  <!-- Final -->
  <div id="s-final" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center">
    <div class="podium-wrap">
      <p class="podium-title">🏆 Resultados finales</p>
      <div class="podium-stage" id="podium-stage"></div>
      <div class="podium-rest" id="podium-rest"></div>
    </div>
  </div>

</div>

<!-- Countdown overlay -->
<div id="screen-countdown" class="hidden"></div>
<!-- Floating reaction layer -->
<div class="reaction-layer" id="reaction-layer"></div>
<!-- Confetti layer -->
<div class="confetti-layer" id="confetti-layer"></div>
<!-- Presenter controls (visible only when ?token= is in URL) -->
<div class="presenter-bar hidden" id="presenter-bar">
  <span class="presenter-label">🎤 PRESENTADOR</span>
  <button class="presenter-btn presenter-btn-reveal" id="presenter-reveal-btn" onclick="presenterReveal()">⚡ Revelar</button>
  <button class="presenter-btn presenter-btn-next" id="presenter-next-btn" onclick="presenterNext()">Siguiente →</button>
</div>

<script>
const API = SYNAPTO_CONFIG.backendUrl;
const code = new URLSearchParams(window.location.search).get('code');
let currentQ = null;
let timerLimit = 20;
let isDark = true;
let socket = null;

function _esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
}

// ── Fullscreen ──
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    document.getElementById('fs-btn').textContent = '✕';
  } else {
    document.exitFullscreen().catch(() => {});
    document.getElementById('fs-btn').textContent = '⛶';
  }
}
document.addEventListener('fullscreenchange', () => {
  const inFS = !!document.fullscreenElement;
  document.getElementById('fs-btn').textContent = inFS ? '✕' : '⛶';
});

// ── Music ──
let _audio = null;
let _musicMuted = false;
let _musicVolume = 0.5;

function _volIcon(muted, vol) {
  if (muted || vol === 0) return '🔇';
  if (vol < 0.35) return '🔈';
  if (vol < 0.7) return '🔉';
  return '🔊';
}
function _playTrack(src, loop = true) {
  if (_audio) { _audio.pause(); _audio = null; }
  _audio = new Audio(src);
  _audio.loop = loop;
  _audio.volume = _musicMuted ? 0 : _musicVolume;
  _audio.play().catch(() => {});
}
function stopMusic() {
  if (_audio) { _audio.pause(); _audio = null; }
}
function toggleMusic() {
  _musicMuted = !_musicMuted;
  if (_audio) _audio.volume = _musicMuted ? 0 : _musicVolume;
  document.getElementById('music-btn').textContent = _volIcon(_musicMuted, _musicVolume);
}
function setVolume(val) {
  _musicVolume = parseInt(val) / 100;
  _musicMuted = _musicVolume === 0;
  if (_audio) _audio.volume = _musicVolume;
  const pct = Math.round(_musicVolume * 100);
  document.getElementById('vol-label').textContent = pct + '%';
  document.getElementById('music-btn').textContent = _volIcon(_musicMuted, _musicVolume);
}

// ── Presenter mode ──
const _presenterToken = new URLSearchParams(window.location.search).get('token');
let _presenterGameState = 'lobby';
if (_presenterToken) {
  document.getElementById('presenter-bar').classList.remove('hidden');
}
function _updatePresenterButtons() {
  const revealBtn = document.getElementById('presenter-reveal-btn');
  const nextBtn = document.getElementById('presenter-next-btn');
  revealBtn.style.display = _presenterGameState === 'question' ? '' : 'none';
  nextBtn.style.display = (_presenterGameState === 'lobby' || _presenterGameState === 'results' || _presenterGameState === 'ranking') ? '' : 'none';
  const isLast = nextBtn.dataset.isLast === '1';
  nextBtn.textContent = isLast ? '🏆 Ver resultados' : 'Siguiente →';
}
function presenterNext() {
  if (socket && _presenterToken) socket.emit('admin:next', { token: _presenterToken });
}
function presenterReveal() {
  if (socket && _presenterToken) socket.emit('admin:reveal', { token: _presenterToken });
}

function show(id) {
  ['s-lobby','s-question','s-reveal','s-final'].forEach(s =>
    document.getElementById(s).classList.add('hidden')
  );
  document.getElementById(id).classList.remove('hidden');
}

function showSpectatorBadge() {
  document.getElementById('spectator-badge').classList.add('visible');
}

if (!code) {
  document.querySelector('.content').innerHTML = '<p style="color:rgba(255,255,255,.4);font-size:24px">Sin código de sala. Abrí desde el panel admin.</p>';
} else {
  socket = io(API);
  socket.emit('screen:join', { code });

  socket.on('screen:state', ({ status, joinUrl, qr, players, currentQuestion, currentReveal, finalRanking, teamMode, teams }) => {
    document.getElementById('lobby-code').textContent = code;
    document.getElementById('lobby-url').textContent = joinUrl || '';
    if (qr) {
      const qrBlock = document.getElementById('qr-block');
      qrBlock.innerHTML = `<img src="${qr}" style="display:block;width:220px;height:220px" alt="QR"/>`;
    }
    updatePlayers(players, teamMode, teams);

    _presenterGameState = status;
    if (_presenterToken) _updatePresenterButtons();

    if (status === 'lobby') _playTrack('../sounds/lobby.mp3');
    else if (status === 'question') _playTrack('../sounds/question.mp3');
    else if (status === 'finished') _playTrack('../sounds/victory.mp3', false);

    if (status === 'question' && currentQuestion) {
      showSpectatorBadge();
      timerLimit = currentQuestion.timeLimit;
      currentQ = { text: currentQuestion.text, options: currentQuestion.options };
      document.getElementById('q-progress').textContent = `Pregunta ${currentQuestion.index + 1} de ${currentQuestion.total}`;
      document.getElementById('q-text-big').textContent = currentQuestion.text;
      const letters = ['A','B','C','D'];
      document.getElementById('options-grid').innerHTML = currentQuestion.options.map((opt, i) => `
        <div class="opt-card opt-${i}" id="opt-${i}">
          <span class="lbl">${letters[i]}</span>
          <span>${opt}</span>
        </div>
      `).join('');
      document.getElementById('q-counter-header').textContent = `P ${currentQuestion.index + 1}/${currentQuestion.total}`;
      setTimer(currentQuestion.timeLeft);
      document.getElementById('timer-ring').style.visibility = 'visible';
      show('s-question');

    } else if (status === 'results' && currentReveal) {
      showSpectatorBadge();
      currentQ = { text: currentReveal.questionText, options: currentReveal.options };
      renderReveal(currentReveal.correctIndex, currentReveal.tally, currentReveal.ranking, currentReveal.questionText, currentReveal.options, currentReveal.teamMode);

    } else if (status === 'finished' && finalRanking) {
      showSpectatorBadge();
      renderFinal(finalRanking, teamMode);
    } else {
      show('s-lobby');
    }
  });

  socket.on('lobby:update', ({ players, teamMode, teams }) => updatePlayers(players, teamMode, teams));

  socket.on('question:countdown', ({ seconds, index, total }) => {
    document.getElementById('screen-answered-bar').style.display = 'none';
    document.getElementById('screen-answered-dots').innerHTML = '';
    const el = document.getElementById('screen-countdown');
    el.classList.remove('hidden');
    let n = seconds;
    function tick() {
      el.innerHTML = `<div class="screen-cd-num">${n}</div>`;
      if (n > 0) { n--; setTimeout(tick, 900); }
    }
    tick();
    document.getElementById('q-counter-header').textContent = `Pregunta ${index + 1} de ${total}`;
  });

  socket.on('question:start', ({ index, total, text, options, timeLimit }) => {
    document.getElementById('screen-countdown').classList.add('hidden');
    _playTrack('../sounds/question.mp3');
    _presenterGameState = 'question';
    if (_presenterToken) {
      document.getElementById('presenter-next-btn').dataset.isLast = (index >= total - 1) ? '1' : '0';
      _updatePresenterButtons();
    }
    timerLimit = timeLimit;
    currentQ = { text, options };
    document.getElementById('q-progress').textContent = `Pregunta ${index + 1} de ${total}`;
    document.getElementById('q-text-big').textContent = text;

    const letters = ['A','B','C','D'];
    document.getElementById('options-grid').innerHTML = options.map((opt, i) => `
      <div class="opt-card opt-${i}" id="opt-${i}">
        <span class="lbl">${letters[i]}</span>
        <span>${opt}</span>
      </div>
    `).join('');

    document.getElementById('screen-answered-bar').style.display = 'none';
    document.getElementById('screen-answered-dots').innerHTML = '';

    setTimer(timeLimit);
    document.getElementById('timer-ring').style.visibility = 'visible';
    document.getElementById('q-counter-header').textContent = `P ${index + 1}/${total}`;
    show('s-question');
  });

  socket.on('answer:progress', ({ answered, total }) => {
    const bar = document.getElementById('screen-answered-bar');
    const txt = document.getElementById('screen-answered-text');
    const dots = document.getElementById('screen-answered-dots');
    bar.style.display = 'flex';
    txt.textContent = `${answered} / ${total} respondieron`;
    const maxDots = Math.min(total, 30);
    const filledDots = Math.round(answered / total * maxDots);
    if (dots.children.length !== maxDots) {
      dots.innerHTML = Array.from({ length: maxDots }, () => `<div class="q-answered-dot"></div>`).join('');
    }
    Array.from(dots.children).forEach((d, i) => d.classList.toggle('filled', i < filledDots));
  });

  socket.on('timer:tick', ({ timeLeft }) => setTimerDisplay(timeLeft));

  socket.on('question:reveal', ({ correctIndex, tally, ranking, teamMode }) => {
    document.getElementById('timer-ring').style.visibility = 'hidden';
    stopMusic();
    _presenterGameState = 'results';
    if (_presenterToken) _updatePresenterButtons();
    if (currentQ) renderReveal(correctIndex, tally, ranking, currentQ.text, currentQ.options, teamMode);
  });

  socket.on('reaction:new', ({ emoji }) => spawnReaction(emoji));

  socket.on('game:finished', ({ ranking, teamMode }) => {
    document.getElementById('timer-ring').style.visibility = 'hidden';
    _playTrack('../sounds/victory.mp3', false);
    _presenterGameState = 'finished';
    if (_presenterToken) _updatePresenterButtons();
    renderFinal(ranking, teamMode);
  });
}

function renderReveal(correctIndex, tally, ranking, questionText, options, teamMode) {
  const letters = ['A','B','C','D'];
  const total = tally.reduce((a,b)=>a+b,0) || 1;

  document.getElementById('reveal-q-text').textContent = questionText;
  document.getElementById('reveal-options-grid').innerHTML = options.map((opt, i) => `
    <div class="opt-card opt-${i} ${i === correctIndex ? 'opt-correct' : 'opt-wrong'}">
      <span class="lbl">${i === correctIndex ? '✓' : letters[i]}</span>
      <span>${opt}</span>
    </div>
  `).join('');

  document.getElementById('tally-grid').innerHTML = tally.map((count, i) => `
    <div class="tally-item t${i}">
      <span>${letters[i]}</span>
      <div class="tally-bar"><div class="tally-fill" style="width:${Math.round(count/total*100)}%"></div></div>
      <span class="tally-count">${count}</span>
    </div>
  `).join('');

  const medals = ['🥇','🥈','🥉'];
  const maxScore = ranking[0]?.score || 1;
  document.getElementById('reveal-ranking').innerHTML = teamMode
    ? ranking.map((t, i) => `
        <div class="rank-item" style="animation-delay:${i*0.1}s">
          <span class="rank-pos">${medals[i] || '#'+(i+1)}</span>
          <div style="width:14px;height:14px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between">
              <span class="rank-name">${_esc(t.name)}</span>
              <span class="rank-pts">${t.score.toLocaleString()}</span>
            </div>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(t.score/maxScore*100)}%;background:${t.color}"></div></div>
          </div>
        </div>`).join('')
    : ranking.map((p, i) => `
        <div class="rank-item" style="animation-delay:${i*0.1}s">
          <span class="rank-pos">${medals[i] || '#'+(i+1)}</span>
          <span style="font-size:22px">${_esc(p.emoji || '')}</span>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between">
              <span class="rank-name">${_esc(p.name)}</span>
              <span class="rank-pts">${p.score.toLocaleString()}</span>
            </div>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(p.score/maxScore*100)}%"></div></div>
          </div>
        </div>`).join('');

  show('s-reveal');
}

function renderFinal(ranking, teamMode) {
  const medals = ['🥇','🥈','🥉'];
  const podiumClasses = ['pb2','pb1','pb3'];
  const podiumDelays = ['.5s','.2s','.8s'];

  if (teamMode) {
    // Team podium — use team color bars
    const podiumOrder = [ranking[1], ranking[0], ranking[2]].filter(Boolean);
    document.getElementById('podium-stage').innerHTML = podiumOrder.map((t, vi) => {
      const realIdx = ranking.indexOf(t);
      return `
        <div class="podium-col">
          <div class="podium-player" style="animation-delay:${podiumDelays[vi]}">
            <div style="width:32px;height:32px;border-radius:50%;background:${t.color};margin:0 auto 6px"></div>
            <div class="podium-name">${_esc(t.name)}</div>
            <div class="podium-score">${t.score.toLocaleString()} pts</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${t.playerCount} jugador${t.playerCount !== 1 ? 'es' : ''}</div>
          </div>
          <div class="podium-bar ${podiumClasses[vi]}" style="background:linear-gradient(180deg,${t.color},${t.color}99)">${medals[realIdx] || ''}</div>
        </div>`;
    }).join('');

    const rest = ranking.slice(3);
    document.getElementById('podium-rest').innerHTML = rest.map((t, i) => `
      <div class="rank-item" style="animation-delay:${i*0.1}s">
        <span class="rank-pos" style="font-size:18px;min-width:36px">#${i+4}</span>
        <div style="width:14px;height:14px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
        <span class="rank-name">${_esc(t.name)}</span>
        <span class="rank-pts">${t.score.toLocaleString()}</span>
      </div>`).join('');
  } else {
    const podiumOrder = [ranking[1], ranking[0], ranking[2]].filter(Boolean);
    document.getElementById('podium-stage').innerHTML = podiumOrder.map((p, vi) => {
      const realIdx = ranking.indexOf(p);
      return `
        <div class="podium-col">
          <div class="podium-player" style="animation-delay:${podiumDelays[vi]}">
            <div class="podium-emoji">${_esc(p.emoji || '😎')}</div>
            <div class="podium-name">${_esc(p.name)}</div>
            <div class="podium-score">${p.score.toLocaleString()} pts</div>
          </div>
          <div class="podium-bar ${podiumClasses[vi]}">${medals[realIdx] || ''}</div>
        </div>`;
    }).join('');

    const rest = ranking.slice(3);
    document.getElementById('podium-rest').innerHTML = rest.map((p, i) => `
      <div class="rank-item" style="animation-delay:${i*0.1}s">
        <span class="rank-pos" style="font-size:18px;min-width:36px">#${i+4}</span>
        <span style="font-size:20px">${_esc(p.emoji || '')}</span>
        <span class="rank-name">${_esc(p.name)}</span>
        <span class="rank-pts">${p.score.toLocaleString()}</span>
      </div>`).join('');
  }

  show('s-final');
  spawnConfetti();
}

function spawnConfetti() {
  const layer = document.getElementById('confetti-layer');
  layer.innerHTML = '';
  const colors = ['#7c5cfc','#4ecdc4','#E63946','#2196F3','#FF9800','#4CAF50','#FFD700','#fff'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    const size = 5 + Math.random() * 8;
    el.style.cssText = `
      position:absolute; width:${size}px; height:${size * 1.6}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      left:${Math.random() * 100}%; top:-20px; border-radius:2px;
      opacity:${0.7 + Math.random() * 0.3};
      animation: confettiFall ${1.8 + Math.random() * 2}s ${Math.random() * 2}s ease-in forwards;
      transform: rotate(${Math.random() * 360}deg);
    `;
    layer.appendChild(el);
  }
  setTimeout(() => layer.innerHTML = '', 5000);
}

function updatePlayers(players, teamMode, teams) {
  if (teamMode && teams && teams.length) {
    const byTeam = {};
    teams.forEach(t => { byTeam[t.id] = { ...t, members: [] }; });
    (players || []).forEach(p => { if (p.teamId && byTeam[p.teamId]) byTeam[p.teamId].members.push(p); });
    document.getElementById('player-bubbles').innerHTML = teams.map(t => `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;min-width:120px">
        <div style="display:flex;align-items:center;gap:6px;padding:4px 12px;background:${t.color}22;border:1px solid ${t.color};border-radius:99px">
          <div style="width:10px;height:10px;border-radius:50%;background:${t.color}"></div>
          <span style="font-weight:700;font-size:14px;color:${t.color}">${_esc(t.name)}</span>
          <span style="font-size:13px;color:var(--muted)">${byTeam[t.id]?.members.length || 0}</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center">
          ${(byTeam[t.id]?.members || []).map(p => `<div class="bubble" style="border:1px solid ${t.color}55"><span class="bubble-emoji">${_esc(p.emoji || '😎')}</span><span class="bubble-name">${_esc(p.name)}</span></div>`).join('')}
        </div>
      </div>
    `).join('');
  } else {
    document.getElementById('player-bubbles').innerHTML = (players || []).map(p =>
      `<div class="bubble"><span class="bubble-emoji">${_esc(p.emoji || '😎')}</span><span class="bubble-name">${_esc(p.name)}</span></div>`
    ).join('');
  }
}

function spawnReaction(emoji) {
  const layer = document.getElementById('reaction-layer');
  const el = document.createElement('div');
  el.className = 'reaction-bubble';
  el.textContent = emoji;
  el.style.left = (8 + Math.random() * 84) + '%';
  layer.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function setTimer(seconds) { setTimerDisplay(seconds); }

function setTimerDisplay(t) {
  document.getElementById('timer-num').textContent = t;
  const offset = 163 - (t / timerLimit) * 163;
  const fg = document.getElementById('timer-fg');
  fg.style.strokeDashoffset = offset;
  fg.style.stroke = t <= 5 ? '#E63946' : 'var(--accent2)';
}
</script>
</body>
