<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — Synapto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06060f; --surface: #0f0f1e; --surface2: #161628;
      --border: rgba(255,255,255,0.08); --accent: #7c5cfc; --accent2: #4ecdc4;
      --text: #f0f0ff; --muted: rgba(240,240,255,0.45);
      --danger: #ff6b6b; --success: #51cf66;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex; flex-direction: column; min-height: 100vh;
    }

    .orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: .12; }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; }

    /* Nav */
    nav {
      position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px; border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; }
    .nav-logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-right { font-size: 14px; color: var(--muted); }
    .nav-right a { color: var(--accent2); font-weight: 600; text-decoration: none; }
    .nav-right a:hover { text-decoration: underline; }

    /* Main */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; position: relative; z-index: 1; }

    .auth-card {
      width: 100%; max-width: 440px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 48px 40px;
      box-shadow: 0 40px 100px rgba(0,0,0,.5);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .auth-title { font-size: 28px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 8px; }
    .auth-sub { font-size: 15px; color: var(--muted); margin-bottom: 36px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    label { font-size: 13px; font-weight: 500; color: var(--muted); }
    input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 13px 16px; font-size: 15px;
      font-family: inherit; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,252,.15); }
    input.error { border-color: var(--danger); }

    .input-wrap { position: relative; }
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 0; line-height: 1;
    }
    .toggle-pw:hover { color: var(--text); }

    .forgot { font-size: 13px; color: var(--accent2); text-align: right; display: block; margin-top: -12px; margin-bottom: 20px; text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; border: none; background: var(--accent); color: #fff;
      box-shadow: 0 4px 20px rgba(124,92,252,.4); transition: all .15s;
      font-family: inherit; letter-spacing: -.1px;
    }
    .btn-submit:hover { background: #6a4de8; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,92,252,.5); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .divider { display: flex; align-items: center; gap: 16px; margin: 28px 0; color: var(--muted); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .error-msg {
      display: none; background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.3);
      color: var(--danger); border-radius: 10px; padding: 12px 16px; font-size: 14px;
      margin-bottom: 20px; animation: shake .3s ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">S</div>
    <span class="nav-logo-text">Synapto</span>
  </a>
  <span class="nav-right">¿No tenés cuenta? <a href="/register/">Crear cuenta</a></span>
</nav>

<main>
  <div class="auth-card">
    <h1 class="auth-title">Bienvenido de vuelta</h1>
    <p class="auth-sub">Iniciá sesión para gestionar tus quizzes.</p>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw()" id="pw-toggle">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Iniciar sesión</button>
    </form>

    <div class="divider">o</div>
    <p style="text-align:center;font-size:14px;color:var(--muted)">
      ¿No tenés cuenta? <a href="/register/" style="color:var(--accent2);font-weight:600;text-decoration:none">Crear cuenta gratis →</a>
    </p>
  </div>
</main>

<script>
const API = (window.SYNAPTO_CONFIG || {}).backendUrl || 'https://synapto-production.up.railway.app';

// Redirect if already logged in
if (localStorage.getItem('synapto_token')) {
  window.location.replace('/admin/');
}

function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('pw-toggle');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  document.getElementById('error-msg').classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Iniciando sesión…';

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');

    localStorage.setItem('synapto_token', data.token);
    localStorage.setItem('synapto_user', JSON.stringify(data.user));
    window.location.replace('/admin/');
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = 'Iniciar sesión';
  }
}
</script>
</body>
</html>
